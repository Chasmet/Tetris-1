name: Construire APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Préparer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer Android 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Compiler et vérifier
        run: gradle :app:assembleDebug :app:lintDebug --stacktrace

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoPur4K-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
